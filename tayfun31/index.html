<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meiyo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e8e4dd;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    .welcome {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: bold;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s 0.3s forwards;
    }

    .img-wrap {
      opacity: 0;
      animation: fadeIn 1s 1.2s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .img-wrap img {
      max-width: min(420px, 90vw);
      max-height: 70vh;
      object-fit: contain;
      border-radius: 4px;
      border: 0.5px solid rgba(255,255,255,0.08);
    }

    .search-btn {
      background: #1a1a1a;
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      color: rgba(232,228,221,0.6);
      font-size: 13px;
      padding: 10px 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      font-family: -apple-system, sans-serif;
    }
    .search-btn:hover { border-color: rgba(255,255,255,0.3); color: #e8e4dd; }
    .search-btn svg { width: 16px; height: 16px; }

    .img2 { display: none; }
    .img2.show { display: block; }
    .reveal-wrap {
      opacity: 0;
      animation: fadeIn 0.8s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .caption {
      font-size: 14px;
      color: rgba(232,228,221,0.45);
      text-align: center;
      font-style: italic;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
