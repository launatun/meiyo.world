<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🤍</title>
  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 64; canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const link = document.createElement('link');
      link.rel = 'icon'; link.type = 'image/png';
      document.head.appendChild(link);
      let scale = 1;
      let growing = false;

      function drawHeart(s) {
        ctx.clearRect(0, 0, 64, 64);
        // Purple background
        ctx.beginPath();
        ctx.arc(32, 32, 30, 0, Math.PI * 2);
        ctx.fillStyle = '#1a0a2e';
        ctx.fill();
        // Heart
        ctx.save();
        ctx.translate(32, 34);
        ctx.scale(s, s);
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.bezierCurveTo(0, -14, -12, -14, -12, -4);
        ctx.bezierCurveTo(-12, 4, 0, 12, 0, 12);
        ctx.bezierCurveTo(0, 12, 12, 4, 12, -4);
        ctx.bezierCurveTo(12, -14, 0, -14, 0, -8);
        ctx.fillStyle = '#c9b99a';
        ctx.shadowColor = 'rgba(201,185,154,0.8)';
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.restore();
        link.href = canvas.toDataURL('image/png');
      }

      function animate() {
        if (growing) { scale += 0.015; if (scale >= 1.3) growing = false; }
        else { scale -= 0.015; if (scale <= 0.85) growing = true; }
        drawHeart(scale);
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #e8e4dd;
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle linear infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.4); }
    }


    /* Shooting stars */
    .shooting-star {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.9), 0 0 12px 4px rgba(201,185,154,0.5);
    }
    .shooting-star::after {
      content: '';
      position: absolute;
      top: 50%; right: 2px;
      transform: translateY(-50%) rotate(var(--trail-angle));
      transform-origin: right center;
      width: var(--trail-len);
      height: 1.5px;
      border-radius: 2px;
      background: linear-gradient(to left, rgba(255,255,255,0.95), rgba(201,185,154,0.3), transparent);
    }
    @keyframes shoot {
      0%   { opacity: 0; transform: translate(0, 0) rotate(var(--angle)); }
      8%   { opacity: 1; }
      85%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--angle)); }
    }

    /* Cursor */
    .cursor {
      width: 5px; height: 5px;
      background: #c9b99a;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s;
    }
    .cursor-ring {
      width: 24px; height: 24px;
      border: 0.5px solid rgba(201,185,154,0.4);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 998;
      transform: translate(-50%, -50%);
    }

    /* Content */
    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 3rem;
      padding: 2rem;
    }

    /* Date line */
    .date-line {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: rgba(201,185,154,0.45);
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    /* Counter */
    .counter-wrap {
      opacity: 0;
      animation: fadeUp 1s 0.7s forwards;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .counter-number {
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 300;
      line-height: 1;
      color: #e8e4dd;
      letter-spacing: -0.02em;
      position: relative;
    }
    .counter-number::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 0.5px;
      background: rgba(201,185,154,0.35);
    }
    .counter-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(201,185,154,0.5);
      margin-top: 1rem;
    }

    /* Sub counters */
    .sub-counters {
      display: flex; gap: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s 1.1s forwards;
    }
    .sub-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sub-num {
      font-size: 22px; font-weight: 300; color: #c9b99a;
    }
    .sub-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.15em;
      color: rgba(232,228,221,0.3);
    }

    /* Quote */
    .quote {
      max-width: 460px;
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.7;
      color: rgba(232,228,221,0.65);
      opacity: 0;
      animation: fadeUp 1s 1.5s forwards;
    }

    /* Heart pulse */
    .heart {
      font-size: 14px;
      opacity: 0;
      animation: fadeUp 1s 1.9s forwards, heartbeat 2.2s 2.5s ease-in-out infinite;
      color: #c9b99a;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      15% { transform: scale(1.2); opacity: 1; }
      30% { transform: scale(1); opacity: 0.7; }
      45% { transform: scale(1.1); opacity: 0.9; }
      60% { transform: scale(1); opacity: 0.7; }
    }
    /* Shooting heart */
    .shoot-heart {
      position: fixed;
      font-size: 11px;
      pointer-events: none;
      z-index: 3;
      color: #c9b99a;
      opacity: 0;
      text-shadow: 0 0 8px rgba(201,185,154,0.8), 0 0 16px rgba(201,185,154,0.4);
      transform: translate(-50%, -50%);
      animation: heartAppear 1.8s ease-out forwards;
    }
    @keyframes heartAppear {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      40%  { opacity: 0.9; transform: translate(-50%, -50%) scale(1); }
      70%  { opacity: 0.7; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    }

    /* Floating petals */
    .petal {
      position: fixed;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      animation: fall linear infinite;
      z-index: 0;
    }
    @keyframes fall {
      0% { opacity: 0; transform: translateY(-20px) rotate(0deg); }
      10% { opacity: 0.4; }
      90% { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(105vh) rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="stars" id="stars"></div>

  <div class="wrap">
    <div class="date-line">01.01.2026 — Bugün</div>

    <div class="counter-wrap">
      <div class="counter-number" id="days">0</div>
      <div class="counter-label">GÜN</div>
    </div>

    <div class="sub-counters">
      <div class="sub-item">
        <span class="sub-num" id="hours">0</span>
        <span class="sub-lbl">SAAT</span>
      </div>
      <div class="sub-item">
        <span class="sub-num" id="minutes">0</span>
        <span class="sub-lbl">DAKİKA</span>
      </div>
      <div class="sub-item">
        <span class="sub-num" id="seconds">0</span>
        <span class="sub-lbl">SANİYE</span>
      </div>
    </div>

    <div class="quote">
      Zamanı seninle ölçmek onu daha da anlamlı yapıyor bebişim..
    </div>

    <div class="heart">♡</div>
  </div>

  <script>
    // Cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; });
    (function animRing(){ rx+=(mx-rx)*0.1; ry+=(my-ry)*0.1; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();

    // Stars
    const starsEl = document.getElementById('stars');
    for(let i=0;i<120;i++){
      const s=document.createElement('div');
      s.className='star';
      const size=Math.random()*2+0.5;
      s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
      starsEl.appendChild(s);
    }

    // Petals
    const petals = ['✦','·','∗','⋆','✧'];
    for(let i=0;i<18;i++){
      const p=document.createElement('div');
      p.className='petal';
      p.textContent=petals[Math.floor(Math.random()*petals.length)];
      p.style.cssText=`left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;color:rgba(201,185,154,${0.2+Math.random()*0.3});font-size:${8+Math.random()*10}px;`;
      document.body.appendChild(p);
    }

    // Counter
    // 1 Ocak 2026 00:00 Türkiye saati = 21:00 UTC önceki gün
    const start = new Date('2025-12-31T21:00:00Z');
    function update() {
      const now = new Date();
      const diff = now - start;
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      document.getElementById('days').textContent = days;
      document.getElementById('hours').textContent = String(hours).padStart(2,'0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2,'0');
    }
    update();
    setInterval(update, 1000);

    // Shooting stars
    function createShootingStar() {
      const star = document.createElement('div');
      star.className = 'shooting-star';

      // Start from top edge, random X position
      const startX = Math.random() * window.innerWidth;
      const startY = -10;

      // Angle: mostly downward, slight diagonal (60-80 degrees from horizontal)
      const angleDeg = 65 + Math.random() * 20;
      const angleRad = angleDeg * Math.PI / 180;
      const dist = 300 + Math.random() * 300;
      const dx = Math.cos(angleRad) * dist * (Math.random() > 0.5 ? 1 : -1);
      const dy = Math.sin(angleRad) * dist;

      const duration = 900 + Math.random() * 500;
      const size = 3 + Math.random() * 2.5;
      const trailLen = 120 + Math.random() * 100;

      star.style.left = startX + 'px';
      star.style.top = startY + 'px';
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.setProperty('--dx', dx + 'px');
      star.style.setProperty('--dy', dy + 'px');
      star.style.setProperty('--angle', angleDeg + 'deg');
      star.style.setProperty('--trail-len', trailLen + 'px');
      star.style.setProperty('--trail-angle', '0deg');
      star.style.boxShadow = `0 0 ${size*2}px ${size}px rgba(255,255,255,0.95), 0 0 ${size*5}px ${size*2}px rgba(201,185,154,0.6)`;
      star.style.animation = `shoot ${duration}ms cubic-bezier(0.2,0.8,0.4,1) forwards`;

      document.body.appendChild(star);
      // Spawn heart at landing point
      const landX = startX + dx;
      const landY = startY + dy;
      setTimeout(() => {
        star.remove();
        spawnHeart(landX, landY);
      }, duration);
    }

    function scheduleShoot() {
      createShootingStar();
      // Next one in 4-9 seconds — visible, not too frequent
      setTimeout(scheduleShoot, 4000 + Math.random() * 5000);
    }
    setTimeout(scheduleShoot, 2000);

    // Spawn heart at shooting star landing point
    function spawnHeart(x, y) {
      const h = document.createElement('div');
      h.className = 'shoot-heart';
      h.textContent = '♡';
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1900);
    }
  </script>
</body>
</html>
